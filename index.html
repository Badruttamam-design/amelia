<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="icon.png">
  <title>Sang Rembulan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Quicksand:wght@400;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Intro Envelope Screen -->
  <div id="introScreen" class="intro-screen">
    <div class="envelope-wrapper">
      <div class="envelope" id="envelope">
        <div class="top-flap"></div>
        <div class="paper-letter">
          <div class="text">Untuk Amelia</div>
          <div class="heart-stamp">❤️</div>
          <div class="text">Sayangku</div>
        </div>
        <div class="front"></div>
        <div class="bottom-flap"></div>
      </div>
      <div class="tap-text">Buka Amplopnya Sayang</div>
    </div>
  </div>

  <!-- Background Music -->
  <audio id="bgMusic" src="sound/bgm.mp3" loop></audio>

  <!-- Canvas for particle aurora background -->
  <canvas id="bgCanvas"></canvas>

  <!-- Glow orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Main card -->
  <div class="scene">
    <div class="card" id="mainCard">
      <!-- Photo Slideshow Background -->
      <div class="card-slideshow" id="cardSlideshow">
        <!-- Foto akan digenerate otomatis oleh JavaScript -->
      </div>

      <!-- Shimmer border effect -->
      <div class="card-border-glow"></div>

      <!-- Inner content -->
      <div class="card-inner">
        <div class="text-container" id="textContainer">
          <span class="letter" data-letter="I">I</span>
          <span class="letter" data-letter="L">L</span>
          <span class="letter" data-letter="O">O</span>
          <span class="letter" data-letter="V">V</span>
          <span class="letter" data-letter="E">E</span>
          <span class="letter" data-letter="Y">Y</span>
          <span class="letter" data-letter="O2">O</span>
          <span class="letter" data-letter="U">U</span>
        </div>

        <div class="subtitle-slot" id="subtitleSlot"></div>
      </div>
    </div>
  </div>

  <!-- Floating emojis layer -->
  <div id="floatLayer"></div>

  <!-- Message overlay -->
  <div class="final-message" id="finalMessage"></div>

  <!-- Birthday Countdowns -->
  <div class="countdown-container">
    <div class="countdown-box">
      <div class="countdown-title">Tamam Birthday</div>
      <div class="countdown-date">25 April</div>
      <div class="countdown-timer" id="timerTamam">00 hari 00 jam 00 menit 00 detik</div>
    </div>
    <div class="countdown-box">
      <div class="countdown-title">Amell Birthday</div>
      <div class="countdown-date">13 Mei</div>
      <div class="countdown-timer" id="timerAmelia">00 hari 00 jam 00 menit 00 detik</div>
    </div>
  </div>

  <script src="script.js?v=8"></script>
</body>

</html>
